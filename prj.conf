# Core
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_ASSERT=y

# GPIO / matrix / encoder
CONFIG_GPIO=y

# BLE HID over GATT
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=2
CONFIG_BT_SMP=y
CONFIG_BT_DEVICE_NAME="AI_BLE_KEYBOARD"
CONFIG_BT_DEVICE_APPEARANCE=961
CONFIG_BT_GATT_AUTO_SEC_REQ=n
CONFIG_BT_AUTO_PHY_UPDATE=n
CONFIG_BT_BAS=y
CONFIG_BT_HIDS=y
CONFIG_BT_HIDS_MAX_CLIENT_COUNT=2
CONFIG_BT_HIDS_DEFAULT_PERM_RW_ENCRYPT=y
CONFIG_BT_GATT_UUID16_POOL_SIZE=48
CONFIG_BT_GATT_CHRC_POOL_SIZE=24
CONFIG_BT_CONN_CTX=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_SETTINGS=y

# USB HID keyboard. The legacy stack keeps this custom HID transport compact on NCS 3.2.3.
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n
CONFIG_USB_DEVICE_HID=y
CONFIG_USB_DEVICE_PRODUCT="AI BLE Keyboard"
CONFIG_USB_DEVICE_PID=0xA107
CONFIG_USB_DEVICE_VID=0x1915
CONFIG_USB_DEVICE_REMOTE_WAKEUP=y
CONFIG_DEPRECATION_TEST=y

# Power and battery monitor
CONFIG_ADC=y
CONFIG_I2C=y

# WS2812 RGB
CONFIG_SPI=y
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_SPI=y

# SSD1306 status display
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Console useful during board bring-up.
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_PRINTK=y
